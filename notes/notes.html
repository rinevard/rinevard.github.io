  <head>
    <meta charset="utf-8" />

    <title>课程笔记 - Rinevard</title>
    <link href="https://fonts.googleapis.com/" rel="preconnect" />
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap"
      rel="stylesheet"
    />
    <link href="../styles.css" rel="stylesheet" type="text/css" />
    <script>
      (function () {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("theme", theme);
      })();
    </script>
    <script src="../scripts.js" defer></script>
    <script
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"
      defer
      id="MathJax-script"
    ></script>
  </head>
  <body>
    <nav class="top-nav">
      <div class="nav-content">
        <a class="nav-logo">Rinevard</a>
        <div class="nav-items">
          <a href="../index.html" class="nav-item">首页</a>
          <a href="notes.html" class="nav-item">笔记</a>
        </div>
      </div>
    </nav>
    <div class="content-wrapper">
      <header>
        <h1>课程笔记</h1>
        <button id="invert-theme">深色模式</button>
      </header>
      <main>
        <p>这里是我的一些课程笔记：</p>

        <li><a href="MIT6-031/index.html">MIT 6.031</a>：软件工程</li>
        <li><a href="RLmath/index.html">强化学习的数学原理</a></li>
        <li><a href="CS126/index.html">CS126</a>：概率论与随机过程</li>
        <li><a href="CS364A/index.html">CS364A</a>：算法博弈论（施工中）</li>
        <div class="giscus"></div>
      </main>
    </div>
    <footer>
      <p class="small-text">
        Inspired by

          rel="noopener noreferrer"
          >Alex Fu</a

        <a
          href="https://opensource.org/licenses/MIT"

          rel="noopener noreferrer"
          >MIT License</a
        >.
      </p>
    </footer>
    <script>
      function loadGiscus() {
        const theme = document.documentElement.getAttribute("theme");
        const giscusTheme = theme === "dark" ? "dark_dimmed" : "light";

        const script = document.createElement("script");
        script.src = "https://giscus.app/client.js";
        script.setAttribute("data-repo", "rinevard/rinevard.github.io");
        script.setAttribute("data-repo-id", "R_kgDOLkoe9A");
        script.setAttribute("data-category-id", "DIC_kwDOLkoe9M4CjJnR");
        script.setAttribute("data-mapping", "pathname");
        script.setAttribute("data-strict", "1");
        script.setAttribute("data-reactions-enabled", "1");
        script.setAttribute("data-emit-metadata", "0");
        script.setAttribute("data-input-position", "top");
        script.setAttribute("data-theme", giscusTheme);
        script.setAttribute("data-lang", "zh-CN");
        script.setAttribute("data-loading", "lazy");
        script.setAttribute("crossorigin", "anonymous");
        script.async = true;

        const giscusContainer = document.querySelector(".giscus");
        giscusContainer.innerHTML = "";
        giscusContainer.appendChild(script);
      }

      // 初始加载 Giscus
      loadGiscus();

      // 监听主题变化
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (
            mutation.type === "attributes" &&
            mutation.attributeName === "theme"
          ) {
            loadGiscus();
          }
        });
      });

      observer.observe(document.documentElement, { attributes: true });

      // 修改主题切换按钮的点击事件处理程序
      document
        .getElementById("invert-theme")
        .addEventListener("click", function () {
          const currentTheme = document.documentElement.getAttribute("theme");
          const newTheme = currentTheme === "light" ? "dark" : "light";
          document.documentElement.setAttribute("theme", newTheme);
          localStorage.setItem("theme", newTheme);
          this.textContent = newTheme === "light" ? "深色模式" : "浅色模式";
        });
    </script>
  </body>
</html>
